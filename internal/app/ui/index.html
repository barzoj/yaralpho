<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ralph App UI</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f9fb;
      --card: #ffffff;
      --border: #d9e2ec;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #2563eb;
      --error: #b91c1c;
      --success: #15803d;
      --warning: #b45309;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    header {
      padding: 16px 20px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 1;
    }
    header h1 {
      margin: 0 0 4px 0;
      font-size: 20px;
    }
    header p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }
    main {
      max-width: 1100px;
      margin: 20px auto;
      padding: 0 16px 40px;
    }
    .status {
      padding: 10px 12px;
      border-radius: 8px;
      background: #e2e8f0;
      color: var(--text);
      border: 1px solid var(--border);
      margin-bottom: 12px;
      font-size: 14px;
    }
    .status.success { background: #ecfdf3; border-color: #bbf7d0; color: var(--success); }
    .status.error { background: #fef2f2; border-color: #fecdd3; color: var(--error); }
    .status.loading { background: #eff6ff; border-color: #bfdbfe; color: var(--accent); }
    .status.warning { background: #fffbeb; border-color: #fde68a; color: var(--warning); }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 5px 20px rgba(15, 23, 42, 0.05);
    }
    .app-shell {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 16px;
      align-items: start;
      margin-top: 12px;
    }
    .sidebar {
      display: grid;
      gap: 10px;
      position: sticky;
      top: 12px;
    }
    .nav-stack,
    .nav-list {
      display: grid;
      gap: 8px;
      width: 100%;
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .nav-link {
      display: inline-flex;
      width: 100%;
      justify-content: flex-start;
      text-align: left;
    }
    .nav-toggle-row {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }
    .nav-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #e2e8f0;
      color: var(--text);
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
    }
    .nav-toggle:hover { background: #cbd5e1; }
    .nav-toggle:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .nav-toggle-icon {
      font-size: 18px;
      line-height: 1;
    }
    .nav-dropdown {
      width: 100%;
    }
    .sidebar-header {
      font-weight: 700;
      font-size: 14px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .main-area {
      display: grid;
      gap: 12px;
    }
    .run-layout {
      display: grid;
      gap: 12px;
    }
    .run-header {
      position: sticky;
      top: var(--run-header-offset, 0px);
      z-index: 2;
      display: grid;
      gap: 10px;
    }
    .run-events {
      display: grid;
      gap: 10px;
    }
    .events-scroll {
      overflow-y: auto;
      max-height: calc(100vh - 200px);
    }
    .view-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .breadcrumbs {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: var(--muted);
      flex: 1 1 auto;
    }
    .breadcrumbs a { color: var(--accent); text-decoration: none; }
    .breadcrumbs a:hover { text-decoration: underline; }
    h2 {
      margin: 0;
      font-size: 18px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 6px;
    }
    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      font-size: 14px;
      vertical-align: top;
    }
    th { color: var(--muted); font-weight: 600; }
    tr:hover td { background: #f8fafc; }
    a {
      color: var(--accent);
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
    .empty {
      color: var(--muted);
      font-size: 14px;
      margin: 8px 0;
    }
    .meta-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 8px;
      margin: 12px 0;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 999px;
      background: #e0e7ff;
      color: #3730a3;
      font-size: 12px;
      border: 1px solid #c7d2fe;
    }
    .pill.live-status.live { background: #ecfdf3; border-color: #bbf7d0; color: var(--success); }
    .pill.live-status.paused { background: #fff7ed; border-color: #fde68a; color: var(--warning); }
    .events {
      margin-top: 12px;
      display: grid;
      gap: 12px;
    }
    .event {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      background: #f8fafc;
      box-shadow: 0 2px 10px rgba(15, 23, 42, 0.04);
    }
    .event-emoji {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      font-size: 20px;
      background: #e0f2fe;
      border: 1px solid #cbd5e1;
      color: var(--text);
      flex-shrink: 0;
    }
    .event-body {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }
    .event-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      flex-wrap: wrap;
    }
    .event-title {
      font-weight: 700;
      font-size: 15px;
      color: var(--text);
    }
    .event-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
    }
    .event-type {
      padding: 2px 8px;
      border-radius: 999px;
      background: #e2e8f0;
      border: 1px solid var(--border);
      font-weight: 600;
    }
    .event-summary {
      font-size: 14px;
      color: var(--text);
      word-break: break-word;
    }
    .event-content {
      font-size: 14px;
      color: var(--text);
      word-break: break-word;
    }
    .chat-bubble {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #fff;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.5);
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .chat-user { background: #e0f2fe; border-color: #bae6fd; }
    .chat-system { background: #f8fafc; border-color: #cbd5e1; }
    .chat-pending { background: #fff7ed; border-color: #fed7aa; color: #9a3412; }
    pre {
      margin: 0;
      background: #0b1220;
      color: #e2e8f0;
      border-radius: 8px;
      padding: 10px;
      overflow-x: auto;
      font-size: 12px;
    }
    .details-toggle {
      align-self: flex-start;
      background: #e2e8f0;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      font-weight: 600;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
    }
    .details-toggle:hover { background: #cbd5e1; }
    .event-details {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: #0b1220;
    }
    .form-grid {
      display: grid;
      gap: 10px;
      align-content: start;
    }
    .input-control,
    .select-control,
    .textarea-control {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #f8fafc;
      color: var(--text);
      font-size: 14px;
      transition: border-color 120ms ease, box-shadow 120ms ease, background-color 120ms ease;
    }
    .input-control:focus-visible,
    .select-control:focus-visible,
    .textarea-control:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.16);
      background: #eef2ff;
    }
    .button-control {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 12px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: background-color 120ms ease, border-color 120ms ease, color 120ms ease, box-shadow 120ms ease;
    }
    .button-control:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.16);
    }
    .button-primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .button-primary:hover {
      background: #1d4ed8;
      border-color: #1d4ed8;
    }
    .button-secondary {
      background: #e2e8f0;
      color: var(--text);
    }
    .button-secondary:hover {
      background: #cbd5e1;
    }
    @media (max-width: 640px) {
      .event {
        grid-template-columns: 1fr;
      }
      .event-emoji {
        width: 36px;
        height: 36px;
        font-size: 18px;
      }
    }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 8px 0;
    }
    .button-link {
      display: inline-flex;
      align-items: center;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #e2e8f0;
      color: var(--text);
      font-weight: 600;
      font-size: 13px;
      text-decoration: none;
    }
    .button-link:hover { background: #cbd5e1; }
    .layout-footer {
      margin: 20px auto 0;
      max-width: 1100px;
      padding: 16px;
      color: var(--muted);
      font-size: 13px;
      background: var(--card);
      border-top: 1px solid var(--border);
    }
    .layout-footer-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }
    @media (max-width: 768px) {
      .nav-toggle-row {
        display: flex;
      }
      .nav-dropdown {
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        right: 0;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.12);
        padding: 10px;
        display: none;
        z-index: 5;
      }
      .nav-dropdown[data-open="true"] {
        display: block;
      }
      .nav-dropdown[aria-hidden="true"] {
        display: none;
      }
      .sidebar {
        position: relative;
      }
    }
    @media (max-width: 900px) {
      .app-shell {
        grid-template-columns: 1fr;
      }
      .sidebar {
        position: relative;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Ralph App UI</h1>
    <p>Navigate with <code>?batch=&lt;id&gt;</code> or <code>?run=&lt;id&gt;</code>. Data comes from existing JSON APIs.</p>
  </header>
  <main>
    <div class="app-shell">
      <aside class="sidebar card">
        <div class="sidebar-header">Navigation</div>
        <div class="nav-toggle-row">
          <button
            id="nav-toggle"
            class="nav-toggle"
            type="button"
            aria-expanded="false"
            aria-controls="nav-dropdown"
            aria-label="Toggle navigation menu"
          >
            <span class="nav-toggle-icon" aria-hidden="true">☰</span>
            Menu
          </button>
        </div>
        <div id="nav-dropdown" class="nav-dropdown" data-open="false" aria-hidden="true">
          <nav id="nav" class="nav-stack nav-list" aria-label="Primary"></nav>
        </div>
      </aside>
      <section class="main-area">
        <div id="status" class="status info">Loading view…</div>
        <div class="view-header">
          <div id="breadcrumbs" class="breadcrumbs"></div>
          <h2 id="view-title">Batches</h2>
        </div>
        <div id="content" class="card"></div>
      </section>
    </div>
  </main>
  <footer class="layout-footer" role="contentinfo">
    <div id="footer-content" class="layout-footer-inner">
      <span class="footer-placeholder">Footer placeholder — add helpful links soon.</span>
    </div>
  </footer>
  <script src="/app/static/live_merge.js"></script>
  <script src="/app/static/live_reconnect.js"></script>
  <script src="/app/static/app.js"></script>
</body>
</html>
