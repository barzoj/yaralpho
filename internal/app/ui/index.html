<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ralph App UI</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f9fb;
      --card: #ffffff;
      --border: #d9e2ec;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #2563eb;
      --error: #b91c1c;
      --success: #15803d;
      --warning: #b45309;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    header {
      padding: 16px 20px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 1;
    }
    header h1 {
      margin: 0 0 4px 0;
      font-size: 20px;
    }
    header p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }
    main {
      max-width: 1100px;
      margin: 20px auto;
      padding: 0 16px 40px;
    }
    .status {
      padding: 10px 12px;
      border-radius: 8px;
      background: #e2e8f0;
      color: var(--text);
      border: 1px solid var(--border);
      margin-bottom: 12px;
      font-size: 14px;
    }
    .status.success { background: #ecfdf3; border-color: #bbf7d0; color: var(--success); }
    .status.error { background: #fef2f2; border-color: #fecdd3; color: var(--error); }
    .status.loading { background: #eff6ff; border-color: #bfdbfe; color: var(--accent); }
    .status.warning { background: #fffbeb; border-color: #fde68a; color: var(--warning); }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 5px 20px rgba(15, 23, 42, 0.05);
    }
    .view-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .breadcrumbs {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: var(--muted);
      flex: 1 1 auto;
    }
    .breadcrumbs a { color: var(--accent); text-decoration: none; }
    .breadcrumbs a:hover { text-decoration: underline; }
    h2 {
      margin: 0;
      font-size: 18px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 6px;
    }
    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      font-size: 14px;
      vertical-align: top;
    }
    th { color: var(--muted); font-weight: 600; }
    tr:hover td { background: #f8fafc; }
    a {
      color: var(--accent);
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
    .empty {
      color: var(--muted);
      font-size: 14px;
      margin: 8px 0;
    }
    .meta-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 8px;
      margin: 12px 0;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 999px;
      background: #e0e7ff;
      color: #3730a3;
      font-size: 12px;
      border: 1px solid #c7d2fe;
    }
    .events {
      margin-top: 12px;
      display: grid;
      gap: 12px;
    }
    .event {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      background: #f8fafc;
      box-shadow: 0 2px 10px rgba(15, 23, 42, 0.04);
    }
    .event-emoji {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      font-size: 20px;
      background: #e0f2fe;
      border: 1px solid #cbd5e1;
      color: var(--text);
      flex-shrink: 0;
    }
    .event-body {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }
    .event-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      flex-wrap: wrap;
    }
    .event-title {
      font-weight: 700;
      font-size: 15px;
      color: var(--text);
    }
    .event-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
    }
    .event-type {
      padding: 2px 8px;
      border-radius: 999px;
      background: #e2e8f0;
      border: 1px solid var(--border);
      font-weight: 600;
    }
    .event-summary {
      font-size: 14px;
      color: var(--text);
      word-break: break-word;
    }
    .event-content {
      font-size: 14px;
      color: var(--text);
      word-break: break-word;
    }
    .chat-bubble {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #fff;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.5);
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .chat-user { background: #e0f2fe; border-color: #bae6fd; }
    .chat-system { background: #f8fafc; border-color: #cbd5e1; }
    .chat-pending { background: #fff7ed; border-color: #fed7aa; color: #9a3412; }
    pre {
      margin: 0;
      background: #0b1220;
      color: #e2e8f0;
      border-radius: 8px;
      padding: 10px;
      overflow-x: auto;
      font-size: 12px;
    }
    .details-toggle {
      align-self: flex-start;
      background: #e2e8f0;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      font-weight: 600;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
    }
    .details-toggle:hover { background: #cbd5e1; }
    .event-details {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: #0b1220;
    }
    @media (max-width: 640px) {
      .event {
        grid-template-columns: 1fr;
      }
      .event-emoji {
        width: 36px;
        height: 36px;
        font-size: 18px;
      }
    }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 8px 0;
    }
    .button-link {
      display: inline-flex;
      align-items: center;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #e2e8f0;
      color: var(--text);
      font-weight: 600;
      font-size: 13px;
      text-decoration: none;
    }
    .button-link:hover { background: #cbd5e1; }
  </style>
</head>
<body>
  <header>
    <h1>Ralph App UI</h1>
    <p>Navigate with <code>?batch=&lt;id&gt;</code> or <code>?run=&lt;id&gt;</code>. Data comes from existing JSON APIs.</p>
  </header>
  <main>
    <div id="status" class="status info">Loading view…</div>
    <div class="view-header">
      <div id="breadcrumbs" class="breadcrumbs"></div>
      <h2 id="view-title">Batches</h2>
    </div>
    <div id="content" class="card"></div>
  </main>
  <script src="/app/static/app.js"></script>
</body>
</html>
